        <h2 style="margin-left: 35px;">Calculator</h2>

        <label for="number1">Enter First Number</label><br>

        <button id="divideButton" onclick="divideButton()" style="display: inline-block;" type='button'> / </button>
        <button id="multiplyButton" onclick="multiplyButton()" style="display: inline-block;" type='button'> * </button>    
        <br><br>

            <input type="number" id="number2" name="number2" value="" placeholder="" required>

        <br><br>

        <button onclick="calculate()" style="margin-left: 40px;">Calculate</button>
